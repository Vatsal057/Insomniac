name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so build.sh derives version/build from git

      - name: Build app and DMG
        run: |
          chmod +x build.sh
          ./build.sh dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: Insomniac.dmg
          generate_release_notes: true
